<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Cantonese Anywhere</title>
    <meta name="description" content="Learn Cantonese anywhere with flashcards, games, and more!" />

    <!--
      Content Security Policy.
      script/style 'unsafe-inline' is required because Ionic and Vite both rely
      on inline styles/scripts; it still meaningfully restricts where we can
      connect/embed external resources. Update connect-src/frame-src/img-src
      if adding new third-party hosts.
    -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval';
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com data:;
      img-src 'self' data: blob: https://wsrv.nl https://i.ytimg.com;
      media-src 'self' data: blob: https://translate.google.com https://tts-server-446058742621.asia-east1.run.app;
      connect-src 'self' ws: wss: https://api.rss2json.com https://translate.google.com https://tts-server-446058742621.asia-east1.run.app https://fonts.googleapis.com https://fonts.gstatic.com;
      frame-src https://www.youtube-nocookie.com https://www.youtube.com;
      object-src 'none';
      base-uri 'self';
      form-action 'self';
    " />

    <base href="/" />

    <meta name="color-scheme" content="light dark" />
    <meta
      name="viewport"
      content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0"
    />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />

    <link rel="shortcut icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://i.ytimg.com" crossorigin>
    <link rel="preconnect" href="https://api.rss2json.com" crossorigin>
    <!--
      Type system:
        - Inter Tight: UI body + label text (tighter than plain Inter so it doesn't read as default).
        - Noto Serif HK: Hong Kong-style traditional Chinese serif. Used for any CJK display text.
        - JetBrains Mono: jyutping romanization is a scientific notation, so it gets a mono face.
    -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&family=Noto+Serif+HK:wght@500;700;900&display=swap" as="style">
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&family=Noto+Serif+HK:wght@500;700;900&display=swap" rel="stylesheet" media="print" onload="this.media='all'; this.onload=null;">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&family=Noto+Serif+HK:wght@500;700;900&display=swap" rel="stylesheet"></noscript>

    <!-- add to homescreen for ios -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Cantonese Anywhere" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
